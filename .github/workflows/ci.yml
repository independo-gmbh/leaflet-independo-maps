name: "CI"
on:
  push:
    branches:
      - main
      - dev
  pull_request:
    branches:
      - '**'

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    name: "Build Plugin"
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint
      - run: pnpm typecheck
      - run: pnpm test
      - run: pnpm build

  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write # to be able to publish a GitHub release
      issues: write # to be able to comment on released issues
      pull-requests: write # to be able to comment on released pull requests
      id-token: write # to enable npm trusted publishing (OIDC) and provenance
    timeout-minutes: 30
    name: "Publish Plugin"
    needs:
      - build
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'pnpm'
      # npm trusted publishing (OIDC) requires the npm CLI >= 11.5.1. Node 24
      # ships a recent npm, but pin the floor explicitly so publishing never
      # silently falls back to an unauthenticated state.
      - run: npm install -g npm@^11
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - name: 'Semantic Release'
        run: pnpm exec semantic-release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
